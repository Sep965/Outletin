    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tambah Outlet Baru</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"] { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #218838; }
    </style>
</head>
<body>

    <h2>Tambah Data Outlet</h2>

    <form action="/submit-outlet" method="POST">
        <div class="form-group">
            <label for="nama_outlet">Nama Outlet:</label>
            <input type="text" id="nama_outlet" name="nama_outlet" placeholder="Masukkan nama outlet" required>
        </div>
        
        <button type="submit">Tambah</button>
    </form>

</body>
</html>
